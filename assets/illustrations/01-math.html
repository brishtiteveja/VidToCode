<title>01 — Math (গণিত)</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; background: #0F0F0F; color: #fff;
  }
  h2 { margin-bottom: 4px; font-size: 22px; }
  .bangla { color: #888; margin-bottom: 30px; font-size: 16px; }
  .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
  .card {
    border-radius: 20px; padding: 28px; display: flex; align-items: center;
    justify-content: center; width: 200px; height: 200px;
  }
  .dark { background: #1A1A2E; }
  .light { background: #F5F0EB; }
  .white { background: #FFFFFF; }
  .label { text-align: center; font-size: 12px; color: #666; margin-top: 8px; }

<body>

<h2>01 — Math</h2>
<p class="bangla">গণিত</p>

<div class="cards">
  <div>
    <div class="card dark">
      <svg width="160" height="160" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Background circle -->
        <circle cx="100" cy="100" r="88" fill="#1A1A3E"/>

        <!-- Grid lines (subtle) -->
        <line x1="30" y1="100" x2="170" y2="100" stroke="#2A2A5E" stroke-width="1"/>
        <line x1="100" y1="30" x2="100" y2="170" stroke="#2A2A5E" stroke-width="1"/>
        <line x1="40" y1="60" x2="160" y2="60" stroke="#2A2A5E" stroke-width="0.5"/>
        <line x1="40" y1="140" x2="160" y2="140" stroke="#2A2A5E" stroke-width="0.5"/>
        <line x1="60" y1="40" x2="60" y2="160" stroke="#2A2A5E" stroke-width="0.5"/>
        <line x1="140" y1="40" x2="140" y2="160" stroke="#2A2A5E" stroke-width="0.5"/>

        <!-- Triangle (gold) -->
        <polygon points="58,148 100,52 142,148" fill="#F4C542"/>

        <!-- Circle (coral, overlapping) -->
        <circle cx="130" cy="80" r="32" fill="#E85D4A" opacity="0.85"/>

        <!-- Square (teal, overlapping) -->
        <rect x="42" y="72" width="48" height="48" rx="4" fill="#1B7A5A" opacity="0.9"/>

        <!-- Pi symbol -->
        <text x="100" y="120" text-anchor="middle" font-size="42" font-weight="900" fill="#F5F0EB" font-family="Georgia, serif">π</text>

        <!-- Plus sign (small, accent) -->
        <rect x="148" y="132" width="20" height="5" rx="2" fill="#F4C542"/>
        <rect x="155.5" y="124.5" width="5" height="20" rx="2" fill="#F4C542"/>

        <!-- Equals sign (small) -->
        <rect x="32" y="42" width="18" height="4" rx="2" fill="#E85D4A"/>
        <rect x="32" y="50" width="18" height="4" rx="2" fill="#E85D4A"/>

        <!-- Decorative dots -->
        <circle cx="155" cy="50" r="4" fill="#F4C542" opacity="0.6"/>
        <circle cx="45" cy="155" r="3" fill="#1B7A5A" opacity="0.6"/>
        <circle cx="160" cy="160" r="5" fill="#E85D4A" opacity="0.4"/>
      </svg>
    </div>
    <p class="label">Dark card</p>
  </div>

  <div>
    <div class="card light">
      <svg width="160" height="160" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

        <line x1="60" y1="40" x2="60" y2="160" stroke="#2A2A5E" stroke-width="0.5"/>
        <line x1="140" y1="40" x2="140" y2="160" stroke="#2A2A5E" stroke-width="0.5"/>

        <rect x="155.5" y="124.5" width="5" height="20" rx="2" fill="#F4C542"/>
        <rect x="32" y="42" width="18" height="4" rx="2" fill="#E85D4A"/>
        <rect x="32" y="50" width="18" height="4" rx="2" fill="#E85D4A"/>
        <circle cx="155" cy="50" r="4" fill="#F4C542" opacity="0.6"/>
        <circle cx="45" cy="155" r="3" fill="#1B7A5A" opacity="0.6"/>
        <circle cx="160" cy="160" r="5" fill="#E85D4A" opacity="0.4"/>
      </svg>
    </div>
    <p class="label">Light card</p>
  </div>

</div>
