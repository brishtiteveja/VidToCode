<style>body{font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0F0F0F;color:#fff}h2{margin-bottom:4px;font-size:22px}.bangla{color:#888;margin-bottom:30px;font-size:16px}.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin-bottom:30px}.card{border-radius:20px;padding:28px;display:flex;align-items:center;justify-content:center;width:200px;height:200px}.dark{background:#1A1A2E}.light{background:#F5F0EB}.label{text-align:center;font-size:12px;color:#666;margin-top:8px}.nav{display:flex;gap:12px;margin-top:20px}.nav a{color:#6366F1;text-decoration:none;font-size:14px}</style></head><body>
<h2>25 — Empty State</h2><p class="bangla">কিছু নেই</p>
<div class="cards"><div><div class="card dark">
<svg width="160" height="160" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="88" fill="#D4C5B5" opacity="0.3"/>
  <!-- Empty box -->
  <rect x="55" y="70" width="90" height="70" rx="8" fill="#D4C5B5" opacity="0.4"/>
  <!-- Box flaps open -->
  <path d="M55 70 L45 52 L100 44 L155 52 L145 70" fill="#D4C5B5" opacity="0.5"/>
  <path d="M100 44 L100 70" stroke="#F5F0EB" stroke-width="1" opacity="0.2"/>
  <!-- Box front face -->
  <rect x="55" y="70" width="90" height="70" rx="8" fill="none" stroke="#F5F0EB" stroke-width="2" opacity="0.3"/>
  <!-- Dashed circle inside box (nothing here) -->
  <circle cx="100" cy="105" r="20" stroke="#F5F0EB" stroke-width="2" stroke-dasharray="4 4" opacity="0.2"/>
  <!-- Question mark inside -->
  <text x="100" y="112" text-anchor="middle" font-size="20" font-weight="700" fill="#F5F0EB" opacity="0.3" font-family="Georgia, serif">?</text>
  <!-- Dust particles -->
  <circle cx="65" cy="155" r="3" fill="#F5F0EB" opacity="0.15"/>
  <circle cx="100" cy="160" r="4" fill="#F5F0EB" opacity="0.1"/>
  <circle cx="135" cy="155" r="3" fill="#F5F0EB" opacity="0.12"/>
  <circle cx="80" cy="162" r="2" fill="#F5F0EB" opacity="0.08"/>
  <circle cx="120" cy="158" r="2.5" fill="#F5F0EB" opacity="0.1"/>
  <!-- Single star (hope) -->
  <circle cx="160" cy="38" r="4" fill="#F4C542" opacity="0.4"/>
  <circle cx="158" cy="36" r="1" fill="#F5F0EB" opacity="0.6"/>
</svg>
</div><p class="label">Dark card</p></div>
<div><div class="card light">
<svg width="160" height="160" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="88" fill="#D4C5B5" opacity="0.3"/>
  <rect x="55" y="70" width="90" height="70" rx="8" fill="#D4C5B5" opacity="0.4"/>
  <path d="M55 70 L45 52 L100 44 L155 52 L145 70" fill="#D4C5B5" opacity="0.5"/>
  <path d="M100 44 L100 70" stroke="#1A1A3E" stroke-width="1" opacity="0.1"/>
  <rect x="55" y="70" width="90" height="70" rx="8" fill="none" stroke="#1A1A3E" stroke-width="2" opacity="0.15"/>
  <circle cx="100" cy="105" r="20" stroke="#1A1A3E" stroke-width="2" stroke-dasharray="4 4" opacity="0.12"/>
  <text x="100" y="112" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A3E" opacity="0.2" font-family="Georgia, serif">?</text>
  <circle cx="65" cy="155" r="3" fill="#1A1A3E" opacity="0.06"/>
  <circle cx="100" cy="160" r="4" fill="#1A1A3E" opacity="0.04"/>
  <circle cx="135" cy="155" r="3" fill="#1A1A3E" opacity="0.05"/>
  <circle cx="160" cy="38" r="4" fill="#F4C542" opacity="0.4"/>
  <circle cx="158" cy="36" r="1" fill="#F5F0EB" opacity="0.6"/>
</svg>
</div><p class="label">Light card</p></div></div>
<p style="color:#666;font-size:13px;max-width:500px;text-align:center;line-height:1.6"><strong style="color:#aaa">Elements:</strong> Muted gray bg. Open empty box with dashed circle and question mark inside. Dust particles. Single gold star (hint of hope). Low opacity throughout — conveys emptiness without being depressing.</p>
