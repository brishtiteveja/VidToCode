<p style="color:#666;font-size:13px;max-width:500px;text-align:center;line-height:1.6"><strong style="color:#aaa">Elements:</strong> Teal bg. Certificate with gold border, "সম্পন্ন" (Completed) header, name line "শিক্ষার্থীর নাম" (Student's name). Coral wax seal with star. Ribbon tails. Laurel branches. Course completion certificate.</p>
