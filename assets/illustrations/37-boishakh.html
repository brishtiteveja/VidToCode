<h2>37 — Pohela Boishakh</h2><p class="bangla">পহেলা বৈশাখ</p>

  <circle cx="100" cy="70" r="32" fill="#F4C542"/>

  <rect x="98" y="28" width="4" height="14" rx="2" fill="#F4C542"/>

  <rect x="98" y="28" width="4" height="14" rx="2" fill="#F4C542" transform="rotate(90 100 70)"/>
  <rect x="98" y="28" width="4" height="14" rx="2" fill="#F4C542" transform="rotate(135 100 70)"/>
  <rect x="98" y="28" width="4" height="14" rx="2" fill="#F4C542" transform="rotate(180 100 70)"/>
  <rect x="98" y="28" width="4" height="14" rx="2" fill="#F4C542" transform="rotate(225 100 70)"/>

  <rect x="98" y="28" width="4" height="14" rx="2" fill="#F4C542" transform="rotate(315 100 70)"/>

  <circle cx="108" cy="66" r="3" fill="#E8924A" opacity="0.5"/>
  <path d="M92 78 Q100 84 108 78" stroke="#E8924A" stroke-width="2" fill="none" opacity="0.5"/>

  <path d="M30 160 Q50 140 70 155 Q90 170 100 155 Q110 170 130 155 Q150 140 170 160" stroke="#F5F0EB" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M40 172 Q60 155 80 168 Q100 180 120 168 Q140 155 160 172" stroke="#F5F0EB" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Mangal Shobhajatra mask (geometric owl) -->
  <circle cx="55" cy="125" r="16" fill="#F5F0EB"/>
  <circle cx="50" cy="122" r="5" fill="#1A1A3E"/>
  <circle cx="60" cy="122" r="5" fill="#1A1A3E"/>

  <rect x="134" y="120" width="32" height="20" rx="4" fill="#E8924A"/>

  <line x1="162" y1="120" x2="162" y2="140" stroke="#1A1A3E" stroke-width="1" opacity="0.3"/>

  <text x="100" y="188" text-anchor="middle" font-size="11" font-weight="800" fill="#F5F0EB" font-family="sans-serif">শুভ নববর্ষ</text>

</div><p class="label">Dark card</p></div></div>
<p style="color:#666;font-size:13px;max-width:500px;text-align:center;line-height:1.6"><strong style="color:#aaa">Elements:</strong> Coral bg (festive). Boishakhi sun with 8 rays and face. Mangal Shobhajatra-style owl mask. Dhol (drum). Alpona floor pattern waves. "শুভ নববর্ষ" (Happy New Year). Iconic Bangladeshi celebration.</p>
