<h2>42 — Writing</h2><p class="bangla">লেখা</p>
<div class="cards"><div><div class="card dark">
<svg width="160" height="160" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="88" fill="#F2A7B3"/>
  <!-- Notebook -->
  <rect x="40" y="35" width="120" height="140" rx="8" fill="#F5F0EB"/>
  <!-- Notebook spine -->
  <rect x="40" y="35" width="12" height="140" rx="4" fill="#D4C5B5"/>
  <!-- Spiral holes -->
  <circle cx="46" cy="52" r="3" fill="#F2A7B3"/><circle cx="46" cy="72" r="3" fill="#F2A7B3"/>
  <circle cx="46" cy="92" r="3" fill="#F2A7B3"/><circle cx="46" cy="112" r="3" fill="#F2A7B3"/>
  <circle cx="46" cy="132" r="3" fill="#F2A7B3"/><circle cx="46" cy="152" r="3" fill="#F2A7B3"/>
  <!-- Ruled lines -->
  <line x1="58" y1="60" x2="150" y2="60" stroke="#D4C5B5" stroke-width="1" opacity="0.4"/>
  <line x1="58" y1="74" x2="150" y2="74" stroke="#D4C5B5" stroke-width="1" opacity="0.4"/>
  <line x1="58" y1="88" x2="150" y2="88" stroke="#D4C5B5" stroke-width="1" opacity="0.4"/>
  <line x1="58" y1="102" x2="150" y2="102" stroke="#D4C5B5" stroke-width="1" opacity="0.4"/>
  <line x1="58" y1="116" x2="150" y2="116" stroke="#D4C5B5" stroke-width="1" opacity="0.4"/>
  <line x1="58" y1="130" x2="150" y2="130" stroke="#D4C5B5" stroke-width="1" opacity="0.4"/>
  <!-- Handwritten Bangla text -->
  <text x="65" y="58" font-size="11" fill="#1A1A3E" opacity="0.5" font-family="sans-serif">আমার প্রিয় বিষয়...</text>
  <text x="65" y="72" font-size="11" fill="#1A1A3E" opacity="0.4" font-family="sans-serif">গণিত কারণ</text>
  <rect x="65" y="84" width="60" height="3" rx="1" fill="#1A1A3E" opacity="0.12"/>
  <rect x="65" y="98" width="45" height="3" rx="1" fill="#1A1A3E" opacity="0.08"/>
  <!-- Pen -->
  <rect x="138" y="20" width="8" height="60" rx="3" fill="#6366F1" transform="rotate(20 142 50)"/>
  <polygon points="138,78 142,90 146,78" fill="#1A1A3E" transform="rotate(20 142 84)"/>
  <rect x="138" y="18" width="8" height="8" rx="2" fill="#4A9FE8" transform="rotate(20 142 22)"/>

  <circle cx="130" cy="80" r="2" fill="#6366F1" opacity="0.3"/>
  <circle cx="126" cy="86" r="1.5" fill="#6366F1" opacity="0.2"/>
</svg>
</div><p class="label">Dark card</p></div></div>
<p style="color:#666;font-size:13px;max-width:500px;text-align:center;line-height:1.6"><strong style="color:#aaa">Elements:</strong> Pink bg. Spiral notebook with ruled lines. Bangla handwriting "আমার প্রিয় বিষয়..." (My favorite subject...) "গণিত কারণ" (Math because). Tilted pen with ink trail. Writing/essay practice.</p>
