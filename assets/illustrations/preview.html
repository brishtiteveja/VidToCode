<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dikkha Illustration Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0F0F0F; color: #fff;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px; min-height: 100vh;
  }
  h1 { font-size: 28px; margin-bottom: 8px; font-weight: 800; }
  .subtitle { color: #888; margin-bottom: 40px; font-size: 14px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 24px; max-width: 1000px; width: 100%;
  }
  .card {
    background: #1A1A2E; border-radius: 20px; padding: 24px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    transition: transform 0.2s; cursor: pointer;
  }
  .card:hover { transform: scale(1.03); }
  .card svg { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }
  .card .label { font-weight: 700; font-size: 15px; color: #E0E0E0; }
  .card .category { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .dark-card { background: #111; }
  .light-card { background: #F5F0EB; }
  .light-card .label { color: #1A1A2E; }
  .bg-options { display: flex; gap: 8px; margin-bottom: 20px; }
  .bg-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid #333; background: none; color: #fff; cursor: pointer; font-size: 12px; }
  .bg-btn.active { background: #6366F1; border-color: #6366F1; }
</style>
</head>
<body>
<h1>Dikkha Illustrations</h1>
<p class="subtitle">Imprint-style geometric vectors for Bangladeshi students</p>

<div class="bg-options">
  <button class="bg-btn active" onclick="setBg('dark')">Dark Card</button>
  <button class="bg-btn" onclick="setBg('navy')">Navy Card</button>
  <button class="bg-btn" onclick="setBg('light')">Light Card</button>
  <button class="bg-btn" onclick="setBg('white')">White Card</button>
</div>

<div class="grid" id="grid">
  <!-- Illustrations injected here -->
</div>

<script>
function setBg(type) {
  const cards = document.querySelectorAll('.card');
  const bgs = { dark: '#1A1A2E', navy: '#0F172A', light: '#F5F0EB', white: '#FFFFFF' };
  const textColors = { dark: '#E0E0E0', navy: '#E0E0E0', light: '#1A1A2E', white: '#1A1A2E' };
  cards.forEach(c => {
    c.style.background = bgs[type];
    c.querySelector('.label').style.color = textColors[type];
  });
  document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
